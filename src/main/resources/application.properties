# =============================================================================
# Variables d'environnement requises en production :
#   JWT_SECRET           - Secret JWT encodé en Base64 (min. 32 octets)
#   GOOGLE_MAPS_API_KEY  - Clé API Google Maps
#   DB_URL               - URL JDBC de la base de données
#   DB_USERNAME          - Nom d'utilisateur de la base de données
#   DB_PASSWORD          - Mot de passe de la base de données
# =============================================================================
spring.application.name=badier-ride

spring.datasource.url=jdbc:mysql://localhost:3306/badier_ride?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080

logging.level.org.springframework.security=DEBUG
logging.level.com.badier.ride=DEBUG
logging.level.org.springframework=DEBUG

jwt.secret=${JWT_SECRET:default-dev-secret-change-in-prod}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

maps.api.key=${GOOGLE_MAPS_API_KEY:}
maps.api.url=https://maps.googleapis.com/maps/api
maps.api.timeout=10000
maps.api.fallback.enabled=true

spring.profiles.active=dev

app.defaults.latitude=48.8566
app.defaults.longitude=2.3522

app.proof.master-code=${APP_PROOF_MASTER_CODE:1234}

sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@badierride.com}

app.upload.dir=${UPLOAD_DIR:uploads/proofs}

app.recurrence.cron=0 0 6 * * *
